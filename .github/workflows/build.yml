name: Build

on:
  release:
    types: [published]

env:
  IMAGE_NAME: ${{ github.repository }}
  REGISTRY: ghcr.io

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      build_backend: ${{ steps.release.outputs.build_backend }}
      build_frontend: ${{ steps.release.outputs.build_frontend }}
      backend_version: ${{ steps.release.outputs.backend_version }}
      frontend_version: ${{ steps.release.outputs.frontend_version }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Check release tag version matches project version
        id: release
        run: |
          TAG="${{ github.event.release.tag_name }}"
          make check-version TAG="$TAG"

          case "$TAG" in
            backend@*)
              echo "build_backend=true" >> "$GITHUB_OUTPUT"
              echo "build_frontend=false" >> "$GITHUB_OUTPUT"
              echo "backend_version=${TAG#backend@}" >> "$GITHUB_OUTPUT"
              ;;
            frontend@*)
              echo "build_backend=false" >> "$GITHUB_OUTPUT"
              echo "build_frontend=true" >> "$GITHUB_OUTPUT"
              echo "frontend_version=${TAG#frontend@}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              VERSION="${TAG#v}"
              echo "build_backend=true" >> "$GITHUB_OUTPUT"
              echo "build_frontend=true" >> "$GITHUB_OUTPUT"
              echo "backend_version=$VERSION" >> "$GITHUB_OUTPUT"
              echo "frontend_version=$VERSION" >> "$GITHUB_OUTPUT"
              ;;
          esac

  build-push-backend:
    runs-on: ubuntu-latest
    needs: [check-version]
    if: ${{ fromJSON(needs.check-version.outputs.build_backend) }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Build cache path
        run: echo "CACHE_PATH=${GITHUB_REPOSITORY@L}" >> ${GITHUB_ENV}

      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---- BACKEND ----
      - name: Docker meta (backend)
        id: meta-backend
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=raw,value=${{ needs.check-version.outputs.backend_version }}
            type=raw,value=latest

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          file: ./backend/Dockerfile
          context: ./backend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_PATH }}-backend:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_PATH }}-backend:cache,mode=max

  build-push-frontend:
    runs-on: ubuntu-latest
    needs: [check-version]
    if: ${{ fromJSON(needs.check-version.outputs.build_frontend) }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Build cache path
        run: echo "CACHE_PATH=${GITHUB_REPOSITORY@L}" >> ${GITHUB_ENV}

      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---- FRONTEND ----
      - name: Docker meta (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=raw,value=${{ needs.check-version.outputs.frontend_version }}
            type=raw,value=latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          file: ./frontend/Dockerfile
          context: ./frontend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_PATH }}-frontend:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_PATH }}-frontend:cache,mode=max
